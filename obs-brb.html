<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>OBS BRB – Ayyappan Poojai</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;900&family=Cormorant+Garamond:ital,wght@0,500;1,500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1920px; height: 1080px; overflow: hidden; background: transparent; font-family: 'DM Sans', sans-serif; }

  .glow-center {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    width: 1400px; height: 700px;
    background: radial-gradient(ellipse at center, rgba(255,107,26,0.1) 0%, rgba(255,180,60,0.05) 40%, transparent 70%);
    pointer-events: none;
  }
  .rule-top, .rule-bottom {
    position: absolute; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent 0%, rgba(255,107,26,0.3) 8%, #FF6B1A 22%, #FFD166 50%, #FF6B1A 78%, rgba(255,107,26,0.3) 92%, transparent 100%);
  }
  .rule-top { top: 60px; } .rule-bottom { bottom: 60px; }
  .rule-top::before, .rule-bottom::before {
    content: '◆'; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    font-size: 10px; color: #FFD166; text-shadow: 0 0 8px rgba(255,200,80,0.9);
  }
  .corner { position: absolute; width: 60px; height: 60px; pointer-events: none; }
  .corner.tl { top: 40px; left: 60px; border-top: 2px solid rgba(255,107,26,0.5); border-left: 2px solid rgba(255,107,26,0.5); }
  .corner.tr { top: 40px; right: 60px; border-top: 2px solid rgba(255,107,26,0.5); border-right: 2px solid rgba(255,107,26,0.5); }
  .corner.bl { bottom: 40px; left: 60px; border-bottom: 2px solid rgba(255,107,26,0.5); border-left: 2px solid rgba(255,107,26,0.5); }
  .corner.br { bottom: 40px; right: 60px; border-bottom: 2px solid rgba(255,107,26,0.5); border-right: 2px solid rgba(255,107,26,0.5); }

  .watermark { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); text-align: center; pointer-events: none; user-select: none; }
  .wm-main { font-family: 'Cinzel', serif; font-size: 96px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(255,255,255,0.03); white-space: nowrap; }
  .wm-sub  { font-family: 'Cinzel', serif; font-size: 30px; font-weight: 600; letter-spacing: 0.38em; text-transform: uppercase; color: rgba(255,255,255,0.02); margin-top: 8px; white-space: nowrap; }

  .stage {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    text-align: center; display: flex; flex-direction: column; align-items: center;
  }
  .org-name {
    font-family: 'Cinzel', serif; font-size: 18px; font-weight: 600;
    letter-spacing: 0.38em; text-transform: uppercase; color: rgba(255,179,102,0.7);
    animation: fadeDown 1s 0.2s cubic-bezier(0.22,1,0.36,1) both;
  }
  .icon { font-size: 64px; margin: 20px 0 10px; animation: fadeDown 1s 0.4s cubic-bezier(0.22,1,0.36,1) both; filter: drop-shadow(0 0 18px rgba(255,140,40,0.6)); }

  .brb-label {
    font-family: 'Cinzel', serif; font-size: 120px; font-weight: 900;
    letter-spacing: 0.08em; color: #FFD166; line-height: 1;
    text-shadow: 0 0 60px rgba(255,180,40,0.3), 0 4px 24px rgba(0,0,0,0.9);
    animation: fadeDown 1s 0.55s cubic-bezier(0.22,1,0.36,1) both;
  }
  .brb-sub {
    font-family: 'Cormorant Garamond', serif; font-style: italic;
    font-size: 44px; font-weight: 500; color: rgba(255,255,255,0.55);
    letter-spacing: 0.1em; margin-top: 10px;
    animation: fadeDown 1s 0.7s cubic-bezier(0.22,1,0.36,1) both;
  }

  .gem-line { display: flex; align-items: center; gap: 18px; margin: 32px 0 28px; animation: fadeDown 1s 0.85s cubic-bezier(0.22,1,0.36,1) both; }
  .gem-line::before { content: ''; display: block; width: 240px; height: 1px; background: linear-gradient(90deg, transparent, rgba(255,107,26,0.6), #FFD166); }
  .gem-line::after  { content: ''; display: block; width: 240px; height: 1px; background: linear-gradient(90deg, #FFD166, rgba(255,107,26,0.6), transparent); }
  .gem { font-size: 16px; color: #FFD166; text-shadow: 0 0 10px rgba(255,200,80,0.8); }

  .dt-stage { display: flex; flex-direction: column; align-items: center; animation: fadeDown 1s 1s cubic-bezier(0.22,1,0.36,1) both; }
  .dt-time-row { display: flex; align-items: baseline; gap: 10px; }
  .dt-time { font-family: 'Cinzel', serif; font-size: 80px; font-weight: 900; color: #FFFFFF; letter-spacing: 0.04em; text-shadow: 0 2px 20px rgba(0,0,0,0.8); }
  .dt-sec  { font-family: 'Cinzel', serif; font-size: 44px; font-weight: 700; color: rgba(255,180,80,0.5); padding-bottom: 8px; }
  .dt-ampm { font-family: 'Cinzel', serif; font-size: 28px; font-weight: 700; color: #FF8C42; letter-spacing: 0.14em; padding-bottom: 10px; text-shadow: 0 0 16px rgba(255,140,40,0.5); }
  .dt-date { font-family: 'DM Sans', sans-serif; font-size: 20px; font-weight: 500; color: #FFB366; letter-spacing: 0.12em; text-transform: uppercase; margin-top: 8px; }

  .bottom-bar { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.92); border-top: 3px solid #FF6B1A; height: 52px; display: flex; align-items: center; justify-content: center; }
  .bar-center { font-family: 'Cinzel', serif; font-size: 13px; font-weight: 600; letter-spacing: 0.32em; text-transform: uppercase; color: rgba(255,150,60,0.5); white-space: nowrap; }

  @keyframes fadeDown { from { opacity: 0; transform: translateY(-18px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>
<div class="glow-center"></div>
<div class="corner tl"></div><div class="corner tr"></div><div class="corner bl"></div><div class="corner br"></div>
<div class="rule-top"></div><div class="rule-bottom"></div>
<div class="watermark"><div class="wm-main">DTS Media Live</div><div class="wm-sub">Dallas Tatvamasi Sangam</div></div>

<div class="stage">
  <div class="org-name">✦ &nbsp; Dallas Tatvamasi Sangam &nbsp; ✦</div>
  <div class="icon">☕</div>
  <div class="brb-label">Be Right Back</div>
  <div class="brb-sub">We'll resume shortly — please stay with us</div>
  <div class="gem-line"><span class="gem">◆</span></div>
  <div class="dt-stage">
    <div class="dt-time-row">
      <div class="dt-time" id="dtTime">--:--</div>
      <div class="dt-sec"  id="dtSec">:--</div>
      <div class="dt-ampm" id="dtAmPm">--</div>
    </div>
    <div class="dt-date" id="dtDate">--- --, ----</div>
  </div>
</div>

<div class="bottom-bar"><div class="bar-center">DTS Media Live &nbsp;·&nbsp; Swamy Saranam</div></div>

<script>
  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const WDAYS  = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  function tick() {
    const n = new Date(); let h = n.getHours(), m = n.getMinutes(), s = n.getSeconds();
    const ap = h >= 12 ? 'PM' : 'AM'; h = h % 12 || 12;
    document.getElementById('dtTime').textContent  = String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0');
    document.getElementById('dtSec').textContent   = ':' + String(s).padStart(2,'0');
    document.getElementById('dtAmPm').textContent  = ap;
    document.getElementById('dtDate').textContent  = WDAYS[n.getDay()] + ',  ' + MONTHS[n.getMonth()] + ' ' + n.getDate() + ',  ' + n.getFullYear();
  }
  tick(); setInterval(tick, 1000);
</script>
</body>
</html>
