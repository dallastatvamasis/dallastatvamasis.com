<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#F5EFE8">
<title>Song Queue — DTS</title>
<style>
:root{--saffron:#FF6B00;--gold:#D4A017;--bg:#F5EFE8;--bg2:#EDE4D8;--card:#FFFFFF;--text:#1A0800;--sub:#8B6B50;--border:rgba(0,0,0,0.09);--red:#E53935;--green:#2E7D32;--blue:#5C7CDB;--safe-b:env(safe-area-inset-bottom,0px);--safe-t:env(safe-area-inset-top,0px)}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{height:100%;-webkit-text-size-adjust:100%}
body{background:var(--bg);color:var(--text);font-family:-apple-system,'SF Pro Text',system-ui,sans-serif;font-size:17px;height:100%;display:flex;flex-direction:column;overflow:hidden;-webkit-font-smoothing:antialiased}
.topbar{background:rgba(245,239,232,0.97);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:calc(var(--safe-t) + 10px) 16px 10px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:100}
.tb-left{display:flex;align-items:center;gap:10px}
.tb-logo{width:40px;height:40px;border-radius:50%;overflow:hidden;box-shadow:0 2px 10px rgba(255,107,0,0.3);flex-shrink:0}
.tb-logo img{width:100%;height:100%;object-fit:cover;display:block}
.tb-title{font-size:17px;font-weight:700;color:var(--text)}
.tb-sub{font-size:11px;color:var(--sub);margin-top:1px}
.tb-db{display:none;align-items:center;gap:5px;border-radius:20px;padding:5px 11px;font-size:12px;font-weight:600;border:1.5px solid}
.tb-db.ok{background:rgba(46,125,50,0.08);border-color:#A5D6A7;color:#2E7D32}
.tb-db.error{background:rgba(229,57,53,0.08);border-color:#EF9A9A;color:#C62828}
.tb-db-dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0}
.tabs{background:rgba(245,239,232,0.97);display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.tab{flex:1;text-align:center;padding:8px 2px 7px;font-size:12px;font-weight:600;color:var(--sub);cursor:pointer;border-bottom:2.5px solid transparent;transition:all 0.15s;-webkit-user-select:none;user-select:none;display:flex;flex-direction:column;align-items:center;gap:1px}
.tab .tab-lbl{font-size:12px}
.tab .tab-cnt{font-size:11px;background:rgba(0,0,0,0.06);border-radius:10px;padding:0 6px;min-width:18px;text-align:center;height:16px;line-height:16px}
.tab.active{color:var(--saffron);border-bottom-color:var(--saffron)}
.tab.active.t-add{color:white;background:var(--saffron);border-bottom-color:var(--saffron)}
.tab.active.t-wait{color:var(--blue);border-bottom-color:var(--blue)}
.tab.active.t-done{color:var(--green);border-bottom-color:var(--green)}
.tab.active .tab-cnt{background:currentColor;color:white}
.page{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;display:none;padding-bottom:calc(20px + var(--safe-b))}
.page.active{display:block}
.hero{margin:12px 14px 0;background:linear-gradient(135deg,var(--saffron),var(--gold));border-radius:18px;padding:14px 16px;display:flex;align-items:center;gap:12px;box-shadow:0 4px 20px rgba(255,107,0,0.28)}
.hero-icon{font-size:38px;flex-shrink:0}
.hero-info{flex:1;min-width:0}
.hero-lbl{font-size:12px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:rgba(255,255,255,0.75);margin-bottom:2px}
.hero-name{font-size:22px;font-weight:700;color:white;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.2}
.hero-song{font-size:15px;color:rgba(255,255,255,0.82);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hero-done-btn{background:rgba(255,255,255,0.25);border:1.5px solid rgba(255,255,255,0.45);border-radius:10px;padding:10px 16px;font-size:14px;font-weight:700;color:white;cursor:pointer;white-space:nowrap;flex-shrink:0;-webkit-user-select:none;user-select:none}
.hero-done-btn:active{background:rgba(255,255,255,0.38)}
.next-row{display:flex;align-items:center;justify-content:space-between;padding:10px 16px 6px}
.next-lbl{font-size:14px;color:var(--sub);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-right:10px}
.next-btn{background:var(--saffron);color:white;border:none;border-radius:20px;padding:10px 20px;font-size:15px;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0;-webkit-user-select:none;user-select:none}
.next-btn:active{opacity:0.82}
.next-btn:disabled{opacity:0.35;cursor:default}
.add-page{padding:16px;display:flex;flex-direction:column;gap:14px}
.add-page-hero{background:linear-gradient(135deg,var(--saffron),var(--gold));border-radius:18px;padding:18px 20px;display:flex;align-items:center;gap:14px;box-shadow:0 4px 16px rgba(255,107,0,0.25)}
.add-page-icon{font-size:44px;flex-shrink:0}
.add-page-title{font-size:20px;font-weight:700;color:white}
.add-page-sub{font-size:14px;color:rgba(255,255,255,0.8);margin-top:3px}
.add-card{background:var(--card);border-radius:16px;padding:16px;box-shadow:0 1px 6px rgba(0,0,0,0.07);display:flex;flex-direction:column;gap:12px}
.add-card-title{font-size:13px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--sub)}
.add-field{display:flex;flex-direction:column;gap:4px}
.add-lbl{font-size:13px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--sub)}
.add-in{width:100%;background:var(--bg);border:1.5px solid var(--bg2);border-radius:10px;padding:13px 15px;font-size:17px;color:var(--text);outline:none;font-family:inherit}
.add-in:focus{border-color:var(--saffron);background:white}
.add-in::placeholder{color:#C0A898}
.add-btn{background:linear-gradient(135deg,var(--saffron),var(--gold));color:white;border:none;border-radius:14px;padding:16px;font-size:17px;font-weight:700;cursor:pointer;width:100%;display:flex;align-items:center;justify-content:center;gap:6px;-webkit-user-select:none;user-select:none}
.add-btn:active{opacity:0.85;transform:scale(0.99)}
.add-btn:disabled{opacity:0.45;cursor:default;transform:none}
.sec-hd{padding:14px 16px 6px;font-size:13px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--sub);display:flex;justify-content:space-between;align-items:center}
.sec-hd span{color:var(--saffron);font-size:13px}
.grp-hd{display:flex;align-items:center;gap:10px;padding:18px 16px 8px}
.grp-icon{font-size:22px;flex-shrink:0}
.grp-label{font-size:14px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;flex:1}
.grp-badge{border-radius:20px;padding:3px 12px;font-size:12px;font-weight:700;border:1.5px solid}
.grp-cur .grp-label{color:var(--saffron)}.grp-cur .grp-badge{background:#FFF3E0;color:var(--saffron);border-color:#FFCC80}
.grp-wait .grp-label{color:var(--blue)}.grp-wait .grp-badge{background:#EEF2FF;color:var(--blue);border-color:#C5D3F5}
.grp-done .grp-label{color:var(--green)}.grp-done .grp-badge{background:#E8F5E9;color:var(--green);border-color:#A5D6A7}
.grp-divider{height:1px;background:var(--border);margin:0 16px}
.grp-block{margin-bottom:8px}
.q-list{display:flex;flex-direction:column}
.q-row{background:var(--card);display:flex;align-items:center;gap:8px;padding:14px 14px 14px 8px;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.1s;-webkit-user-select:none;user-select:none;position:relative;overflow:hidden}
.q-row::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3.5px;background:rgba(92,124,219,0.5)}
.q-row.cur::before{background:var(--saffron)}
.q-row.done::before{background:#81C784}
.q-row:first-child{border-top:1px solid var(--border)}
.q-row:active{background:#FFF5EE}
.q-num{width:22px;font-size:13px;font-weight:700;color:var(--saffron);font-family:ui-monospace,monospace;text-align:center;flex-shrink:0}
.q-info{flex:1;min-width:0}
.q-name{font-size:17px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.q-song{font-size:14px;color:var(--saffron);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.q-song::before{content:'♪ '}
.q-chip{border-radius:20px;padding:4px 11px;font-size:12px;font-weight:700;white-space:nowrap;flex-shrink:0;border:1.5px solid}
.q-chip.wait{background:#EEF2FF;color:var(--blue);border-color:#C5D3F5}
.q-chip.cur{background:#FFF3E0;color:var(--saffron);border-color:#FFCC80}
.q-chip.done{background:#E8F5E9;color:var(--green);border-color:#A5D6A7}
.q-arrow{color:#C8B49A;font-size:18px;flex-shrink:0}
.mv-wrap{display:flex;flex-direction:column;gap:3px;flex-shrink:0}
.mv-btn{width:36px;height:36px;border-radius:10px;background:var(--bg2);border:1.5px solid var(--border);color:var(--sub);font-size:16px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;-webkit-user-select:none;user-select:none;transition:all 0.12s}
.mv-btn:active{background:var(--saffron);border-color:var(--saffron);color:white;transform:scale(0.92)}
.mv-btn:disabled{opacity:0.2;pointer-events:none}
.empty{text-align:center;padding:52px 24px;display:flex;flex-direction:column;align-items:center;gap:8px}
.empty-icon{font-size:50px}
.empty-title{font-size:16px;font-weight:600;color:var(--text)}
.empty-sub{font-size:13px;color:var(--sub);line-height:1.6}
.toolbar{display:flex;gap:8px;padding:0}
.tool-btn{flex:1;background:var(--card);border:1.5px solid var(--border);color:var(--sub);border-radius:10px;padding:10px;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;-webkit-user-select:none;user-select:none}
.tool-btn:active{background:var(--bg2)}
.tool-btn.danger{border-color:rgba(229,57,53,0.25);color:var(--red)}
.tool-btn.danger:active{background:#FFF0EF}
.backdrop{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.42);opacity:0;pointer-events:none;transition:opacity 0.28s}
.backdrop.on{opacity:1;pointer-events:all}
.sheet{position:fixed;bottom:0;left:0;right:0;z-index:201;background:var(--card);border-radius:22px 22px 0 0;padding-bottom:calc(28px + var(--safe-b));transform:translateY(100%);transition:transform 0.35s cubic-bezier(0.32,0.72,0,1);max-height:80vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.sheet.on{transform:translateY(0)}
.sh-handle{width:36px;height:4px;background:#DDD;border-radius:2px;margin:10px auto 16px}
.sh-hdr{display:flex;align-items:center;justify-content:space-between;padding:0 16px 14px;border-bottom:1px solid var(--border)}
.sh-title{font-size:19px;font-weight:700;color:var(--text)}
.sh-close{color:var(--sub);font-size:18px;cursor:pointer;padding:4px 0 4px 16px}
.sh-body{padding:16px;display:flex;flex-direction:column;gap:12px}
.sh-singer-card{background:var(--bg);border-radius:14px;padding:14px;display:flex;align-items:center;gap:12px}
.sh-singer-icon{font-size:36px;flex-shrink:0}
.sh-singer-name{font-size:20px;font-weight:700;color:var(--text)}
.sh-singer-song{font-size:15px;color:var(--saffron);margin-top:3px}
.sh-singer-song::before{content:'♪  '}
.sh-actions-title{font-size:13px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--sub)}
.sh-actions{display:flex;flex-direction:column;gap:8px}
.sh-action-btn{width:100%;padding:14px 16px;border-radius:14px;border:1.5px solid;font-size:16px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:10px;background:var(--card);color:var(--text);-webkit-user-select:none;user-select:none;transition:all 0.15s;text-align:left}
.sh-action-btn:active{transform:scale(0.98)}
.sh-act-icon{font-size:26px;flex-shrink:0}
.sh-act-info{flex:1}
.sh-act-lbl{font-size:17px;font-weight:600}
.sh-act-sub{font-size:13px;color:var(--sub);margin-top:1px}
.sh-btn-cur{border-color:#FFCC80;background:#FFF3E0}
.sh-btn-cur .sh-act-lbl{color:var(--saffron)}
.sh-btn-done{border-color:#A5D6A7;background:#E8F5E9}
.sh-btn-done .sh-act-lbl{color:var(--green)}
.sh-btn-wait{border-color:#C5D3F5;background:#EEF2FF}
.sh-btn-wait .sh-act-lbl{color:var(--blue)}
.sh-btn-del{border-color:rgba(229,57,53,0.25);background:#FFF0EF}
.sh-btn-del .sh-act-lbl{color:var(--red)}
.sh-move-row{display:flex;gap:8px}
.sh-move-btn{flex:1;padding:11px;border-radius:12px;border:1.5px solid var(--border);background:var(--card);color:var(--sub);font-size:15px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;-webkit-user-select:none;user-select:none}
.sh-move-btn:active{background:var(--bg2)}
.sh-move-btn:disabled{opacity:0.3;cursor:default}
#err-panel{display:none;margin:10px 14px;background:#FFF0EF;border:1.5px solid rgba(229,57,53,0.3);border-radius:12px;padding:12px 14px;font-size:12px;color:var(--red);line-height:1.6}
#err-panel.on{display:block}
#toast{position:fixed;bottom:calc(20px + var(--safe-b));left:50%;transform:translateX(-50%) translateY(30px);color:white;border-radius:24px;padding:10px 20px;font-size:13px;font-weight:600;white-space:nowrap;z-index:400;opacity:0;transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1);pointer-events:none}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div class="topbar">
  <div class="tb-left">
    <div class="tb-logo"><img id="logo-img" src="" alt="DTS"></div>
    <div>
      <div class="tb-title">Song Queue</div>
      <div class="tb-sub" id="tb-sub">DTS Media Live</div>
    </div>
  </div>
  <div class="tb-db" id="db-pill">
    <div class="tb-db-dot" id="db-dot"></div>
    <span id="db-txt"></span>
  </div>
</div>

<div class="tabs">
  <div class="tab t-add active" id="tab-add" onclick="setTab('add')">
    <span style="font-size:18px">+</span>
    <span class="tab-lbl">Add</span>
  </div>
  <div class="tab t-all" id="tab-all" onclick="setTab('all')">
    <span class="tab-lbl">All</span>
    <span class="tab-cnt" id="cnt-all">0</span>
  </div>
  <div class="tab t-cur" id="tab-current" onclick="setTab('current')">
    <span class="tab-lbl">Stage</span>
    <span class="tab-cnt" id="cnt-cur">0</span>
  </div>
  <div class="tab t-wait" id="tab-waiting" onclick="setTab('waiting')">
    <span class="tab-lbl">Waiting</span>
    <span class="tab-cnt" id="cnt-wait">0</span>
  </div>
  <div class="tab t-done" id="tab-done" onclick="setTab('done')">
    <span class="tab-lbl">Done</span>
    <span class="tab-cnt" id="cnt-done">0</span>
  </div>
</div>

<div class="page active" id="page-add">
  <div class="add-page">
    <div class="add-page-hero">
      <div class="add-page-icon">&#127908;</div>
      <div>
        <div class="add-page-title">Add Singer</div>
        <div class="add-page-sub">Add a singer to the queue</div>
      </div>
    </div>
    <div class="add-card">
      <div class="add-card-title">Singer Details</div>
      <div class="add-field">
        <div class="add-lbl">Singer Name</div>
        <input class="add-in" id="name-in" type="text" placeholder="e.g. Ramesh Kumar" maxlength="30" autocomplete="off">
      </div>
      <div class="add-field">
        <div class="add-lbl">Song / Bhajan</div>
        <input class="add-in" id="song-in" type="text" placeholder="e.g. Venkateswara Suprabhatam" maxlength="35" autocomplete="off">
      </div>
      <button class="add-btn" id="add-btn" onclick="addEntry()">+ Add to Queue</button>
    </div>
    <div class="add-card-title" style="padding:0 2px 6px">Queue Tools</div>
    <div class="toolbar">
      <button class="tool-btn" onclick="exportCSV()">Export CSV</button>
      <button class="tool-btn" onclick="triggerImport()">Import CSV</button>
      <button class="tool-btn danger" onclick="clearAll()">Clear All</button>
    </div>
    <input type="file" id="csv-in" accept=".csv" style="display:none">
  </div>
</div>

<div class="page" id="page-all">
  <div id="err-panel"></div>
  <div id="hero-wrap"></div>
  <div id="next-wrap"></div>
  <div class="q-list" id="all-list"></div>
</div>

<div class="page" id="page-current">
  <div id="cur-hero-wrap"></div>
  <div id="cur-next-wrap"></div>
  <div class="q-list" id="cur-list"></div>
</div>

<div class="page" id="page-waiting">
  <div class="sec-hd" style="padding-top:14px">Waiting <span id="wait-count">0</span></div>
  <div class="q-list" id="wait-list"></div>
</div>

<div class="page" id="page-done">
  <div class="sec-hd" style="padding-top:14px">Completed <span id="done-count">0</span></div>
  <div class="q-list" id="done-list"></div>
</div>

<div class="backdrop" id="backdrop"></div>
<div class="sheet" id="sheet">
  <div class="sh-handle"></div>
  <div class="sh-hdr">
    <div class="sh-title" id="sh-title">Singer</div>
    <div class="sh-close" onclick="closeSheet()">X</div>
  </div>
  <div class="sh-body" id="sh-body"></div>
</div>

<div id="toast"></div>

<script>
(function() {
  var API = 'api.php';
  var queue = [];
  var activeTab = 'add';
  var sheetId = null;
  var toastTimer = null;

  /* ─ INIT ─ */
  window.addEventListener('DOMContentLoaded', function() {
    loadLogo();

    document.getElementById('name-in').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') { e.preventDefault(); document.getElementById('song-in').focus(); }
    });
    document.getElementById('song-in').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') { e.preventDefault(); addEntry(); }
    });
    document.getElementById('csv-in').addEventListener('change', importCSV);
    document.getElementById('backdrop').addEventListener('click', closeSheet);
    document.getElementById('sheet').addEventListener('click', function(e) { e.stopPropagation(); });

    loadQueue(false);
    setInterval(function() { loadQueue(true); }, 8000);
  });

  function loadLogo() {
    var img = document.getElementById('logo-img');
    var xhr = new XMLHttpRequest();
    xhr.open('GET', 'DTSlogo-black.png', true);
    xhr.responseType = 'blob';
    xhr.onload = function() {
      if (xhr.status === 200) {
        img.src = URL.createObjectURL(xhr.response);
      }
    };
    xhr.send();
  }

  /* ─ TABS ─ */
  window.setTab = function(id) {
    activeTab = id;
    ['add','all','current','waiting','done'].forEach(function(t) {
      var el = document.getElementById('tab-' + t);
      if (el) el.classList.toggle('active', t === id);
    });
    document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active'); });
    var pg = document.getElementById('page-' + id);
    if (pg) pg.classList.add('active');
    if (id === 'add') setTimeout(function() { document.getElementById('name-in').focus(); }, 300);
  };

  /* ─ API ─ */
  function apiCall(action, data) {
    data = data || {};
    var body = JSON.parse(JSON.stringify(data));
    body.action = action;
    return new Promise(function(resolve, reject) {
      var xhr = new XMLHttpRequest();
      xhr.open('POST', API, true);
      xhr.setRequestHeader('Content-Type', 'application/json');
      xhr.onload = function() {
        try {
          var obj = JSON.parse(xhr.responseText);
          if (xhr.status >= 200 && xhr.status < 300) resolve(obj);
          else reject(new Error('HTTP ' + xhr.status));
        } catch(e) { reject(new Error('Bad JSON: ' + xhr.responseText.slice(0,100))); }
      };
      xhr.onerror = function() { reject(new Error('Network error — check api.php is uploaded')); };
      xhr.send(JSON.stringify(body));
    });
  }

  /* ─ LOAD ─ */
  function loadQueue(silent) {
    var xhr = new XMLHttpRequest();
    xhr.open('GET', API + '?action=get', true);
    xhr.onload = function() {
      try {
        var data = JSON.parse(xhr.responseText);
        if (Array.isArray(data)) {
          queue = data;
          setDb('ok');
          document.getElementById('err-panel').classList.remove('on');
          render();
        } else {
          setDb('error');
          if (!silent) showErr(data.error || 'Unknown error');
        }
      } catch(e) {
        setDb('error');
        if (!silent) showErr(e.message);
      }
    };
    xhr.onerror = function() {
      setDb('error');
      if (!silent) showErr('Cannot reach api.php');
    };
    xhr.send();
  }

  function setDb(state) {
    var pill = document.getElementById('db-pill');
    var txt  = document.getElementById('db-txt');
    pill.className = 'tb-db ' + state;
    if (state === 'ok') {
      txt.textContent = 'Connected';
      pill.style.display = 'flex';
      clearTimeout(pill._t);
      pill._t = setTimeout(function() { pill.style.display = 'none'; }, 2000);
    } else if (state === 'error') {
      txt.textContent = 'API Error';
      pill.style.display = 'flex';
    } else {
      pill.style.display = 'none';
    }
  }

  function showErr(msg) {
    var p = document.getElementById('err-panel');
    p.innerHTML = '<strong>API Error</strong><br>' + esc(msg) + '<br><a href="api.php?action=test" target="_blank">Test api.php</a>';
    p.classList.add('on');
  }

  /* ─ RENDER ─ */
  function render() {
    var cur  = queue.filter(function(e) { return e.status === 'current'; });
    var wait = queue.filter(function(e) { return e.status === 'waiting'; });
    var done = queue.filter(function(e) { return e.status === 'done'; });
    var nAll = queue.length;

    document.getElementById('cnt-all').textContent   = nAll;
    document.getElementById('cnt-cur').textContent   = cur.length;
    document.getElementById('cnt-wait').textContent  = wait.length;
    document.getElementById('cnt-done').textContent  = done.length;
    document.getElementById('wait-count').textContent = wait.length;
    document.getElementById('done-count').textContent = done.length;
    document.getElementById('tb-sub').textContent    = nAll + ' singer' + (nAll !== 1 ? 's' : '') + ' · DTS';

    var heroHtml;
    if (cur.length) {
      heroHtml =
        '<div class="hero">' +
          '<div class="hero-icon">&#127908;</div>' +
          '<div class="hero-info">' +
            '<div class="hero-lbl">Now Performing</div>' +
            '<div class="hero-name">' + esc(cur[0].name) + '</div>' +
            '<div class="hero-song">' + esc(cur[0].song) + '</div>' +
          '</div>' +
          '<div class="hero-done-btn" onclick="setStatus(' + cur[0].id + ',\'done\')">Done</div>' +
        '</div>';
    } else {
      heroHtml =
        '<div class="hero" style="justify-content:center;flex-direction:column;gap:6px;padding:18px">' +
          '<span style="font-size:36px">&#127908;</span>' +
          '<span style="font-size:13px;color:rgba(255,255,255,0.75)">No one performing</span>' +
        '</div>';
    }
    document.getElementById('hero-wrap').innerHTML     = heroHtml;
    document.getElementById('cur-hero-wrap').innerHTML = heroHtml;

    var nextHtml =
      '<div class="next-row">' +
        '<div class="next-lbl">' + (wait.length ? 'Next: ' + esc(wait[0].name) : 'No one waiting') + '</div>' +
        '<button class="next-btn" onclick="promoteNext()"' + (!wait.length ? ' disabled' : '') + '>Next</button>' +
      '</div>';
    document.getElementById('next-wrap').innerHTML     = nextHtml;
    document.getElementById('cur-next-wrap').innerHTML = nextHtml;

    /* All tab grouped */
    var allEl = document.getElementById('all-list');
    if (!nAll) {
      allEl.innerHTML = emptyHtml('&#127925;', 'Queue is empty', 'Go to Add tab to add singers.');
    } else {
      var groups = [
        {items:cur,  status:'cur',  icon:'&#127908;', label:'On Stage',  cls:'grp-cur'},
        {items:wait, status:'wait', icon:'&#9203;',   label:'Waiting',   cls:'grp-wait'},
        {items:done, status:'done', icon:'&#9989;',   label:'Completed', cls:'grp-done'}
      ];
      var html = '';
      var idx = 0;
      var first = true;
      groups.forEach(function(g) {
        if (!g.items.length) return;
        if (!first) html += '<div class="grp-divider"></div>';
        first = false;
        html += '<div class="grp-hd ' + g.cls + '">' +
          '<span class="grp-icon">' + g.icon + '</span>' +
          '<span class="grp-label">' + g.label + '</span>' +
          '<span class="grp-badge">' + g.items.length + '</span>' +
        '</div><div class="grp-block">';
        g.items.forEach(function(e) { idx++; html += rowHtml(e, idx, g.status, wait); });
        html += '</div>';
      });
      allEl.innerHTML = html;
    }

    /* Current tab */
    var curEl = document.getElementById('cur-list');
    curEl.innerHTML = !cur.length
      ? emptyHtml('&#127908;', 'No one performing', 'Tap Next or tap a waiting singer.')
      : cur.map(function(e, i) { return rowHtml(e, i+1, 'cur', wait); }).join('');

    /* Waiting tab */
    var waitEl = document.getElementById('wait-list');
    waitEl.innerHTML = !wait.length
      ? emptyHtml('&#9203;', 'No one waiting', 'Add singers using the Add tab.')
      : wait.map(function(e, i) { return rowHtml(e, i+1, 'wait', wait); }).join('');

    /* Done tab */
    var doneEl = document.getElementById('done-list');
    doneEl.innerHTML = !done.length
      ? emptyHtml('&#9989;', 'None completed yet', 'Completed performances appear here.')
      : done.map(function(e, i) { return rowHtml(e, i+1, 'done', wait); }).join('');
  }

  function emptyHtml(icon, title, sub) {
    return '<div class="empty"><div class="empty-icon">' + icon + '</div><div class="empty-title">' + title + '</div><div class="empty-sub">' + sub + '</div></div>';
  }

  function rowHtml(e, idx, sc, waitList) {
    var chipMap  = {cur:'cur', wait:'wait', done:'done'};
    var labelMap = {cur:'On Stage', wait:'Waiting', done:'Done'};
    var isWait   = (e.status === 'waiting');
    var wIdx     = -1;
    for (var i = 0; i < waitList.length; i++) { if (waitList[i].id === e.id) { wIdx = i; break; } }
    var isFirst = (wIdx === 0);
    var isLast  = (wIdx === waitList.length - 1);

    var right;
    if (isWait) {
      right = '<div class="mv-wrap" onclick="event.stopPropagation()">' +
        '<button class="mv-btn" onclick="moveRow(' + e.id + ',-1)"' + (isFirst ? ' disabled' : '') + '>▲</button>' +
        '<button class="mv-btn" onclick="moveRow(' + e.id + ',1)"'  + (isLast  ? ' disabled' : '') + '>▼</button>' +
        '</div>';
    } else {
      right = '<div class="q-chip ' + (chipMap[sc] || sc) + '">' + (labelMap[sc] || e.status) + '</div><div class="q-arrow">›</div>';
    }

    return '<div class="q-row ' + sc + '" data-id="' + e.id + '" onclick="openSheet(' + e.id + ')">' +
      '<div class="q-num">' + idx + '</div>' +
      '<div class="q-info"><div class="q-name">' + esc(e.name) + '</div><div class="q-song">' + esc(e.song) + '</div></div>' +
      right +
    '</div>';
  }

  /* ─ SHEET ─ */
  window.openSheet = function(id) {
    var e = null;
    for (var i = 0; i < queue.length; i++) { if (queue[i].id === id) { e = queue[i]; break; } }
    if (!e) return;
    sheetId = id;
    var wait   = queue.filter(function(q) { return q.status === 'waiting'; });
    var isCur  = (e.status === 'current');
    var isWait = (e.status === 'waiting');
    var isDone = (e.status === 'done');
    var wIdx = -1;
    for (var j = 0; j < wait.length; j++) { if (wait[j].id === id) { wIdx = j; break; } }
    var isFirst = (wIdx === 0);
    var isLast  = (wIdx === wait.length - 1);

    document.getElementById('sh-title').textContent = e.name;

    var html =
      '<div class="sh-singer-card">' +
        '<div class="sh-singer-icon">&#127925;</div>' +
        '<div><div class="sh-singer-name">' + esc(e.name) + '</div>' +
        '<div class="sh-singer-song">' + esc(e.song) + '</div></div>' +
      '</div>' +
      '<div class="sh-actions-title">Change Status</div>' +
      '<div class="sh-actions">' +
        shBtn('sh-btn-cur', '&#127908;', isCur ? '✓ Now Performing' : 'Set as Current', isCur ? 'Currently on stage' : 'Move to stage now', "sheetSetStatus('current')") +
        shBtn('sh-btn-done', '&#9989;', isDone ? '✓ Completed' : 'Mark as Done', 'Performance completed', "sheetSetStatus('done')") +
        shBtn('sh-btn-wait', '&#9203;', isWait ? '✓ In Queue' : 'Move to Waiting', 'Back to waiting queue', "sheetSetStatus('waiting')") +
      '</div>';

    if (isWait) {
      html +=
        '<div class="sh-actions-title">Reorder Queue</div>' +
        '<div class="sh-move-row">' +
          '<button class="sh-move-btn" onclick="sheetMove(-1)"' + (isFirst ? ' disabled' : '') + '>▲ Move Up</button>' +
          '<button class="sh-move-btn" onclick="sheetMove(1)"'  + (isLast  ? ' disabled' : '') + '>▼ Move Down</button>' +
        '</div>';
    }

    html +=
      '<div class="sh-actions">' +
        shBtn('sh-btn-del', '&#128465;', 'Remove from Queue', 'Cannot be undone', 'sheetDelete()') +
      '</div>';

    document.getElementById('sh-body').innerHTML = html;
    document.getElementById('backdrop').classList.add('on');
    document.getElementById('sheet').classList.add('on');
  };

  function shBtn(cls, icon, lbl, sub, onclick) {
    return '<button class="sh-action-btn ' + cls + '" onclick="' + onclick + '">' +
      '<span class="sh-act-icon">' + icon + '</span>' +
      '<div class="sh-act-info"><div class="sh-act-lbl">' + lbl + '</div><div class="sh-act-sub">' + sub + '</div></div>' +
      '</button>';
  }

  window.closeSheet = function() {
    document.getElementById('backdrop').classList.remove('on');
    document.getElementById('sheet').classList.remove('on');
    sheetId = null;
  };

  window.sheetSetStatus = function(status) {
    var id = sheetId;
    if (!id) return;
    closeSheet();
    setStatus(id, status);
  };

  window.sheetMove = function(dir) {
    var id = sheetId;
    if (!id) return;
    var wait = queue.filter(function(e) { return e.status === 'waiting'; });
    var pos  = -1;
    for (var i = 0; i < wait.length; i++) { if (wait[i].id === id) { pos = i; break; } }
    if (pos < 0) return;
    var np = pos + dir;
    if (np < 0 || np >= wait.length) return;
    var iA = -1, iB = -1;
    for (var j = 0; j < queue.length; j++) {
      if (queue[j].id === wait[pos].id) iA = j;
      if (queue[j].id === wait[np].id)  iB = j;
    }
    var tmp = queue[iA]; queue[iA] = queue[iB]; queue[iB] = tmp;
    closeSheet();
    render();
    apiCall('reorder', {ids: queue.map(function(e) { return e.id; })})
      .catch(function() { showToast('Reorder failed', 'err'); loadQueue(true); });
  };

  window.sheetDelete = function() {
    var id = sheetId;
    if (!id) return;
    var e = null;
    for (var i = 0; i < queue.length; i++) { if (queue[i].id === id) { e = queue[i]; break; } }
    if (!confirm('Remove ' + (e ? e.name : 'this singer') + '?')) return;
    closeSheet();
    apiCall('delete', {id: id})
      .then(function() { showToast('Removed', 'ok'); loadQueue(true); })
      .catch(function() { showToast('Delete failed', 'err'); });
  };

  /* ─ ACTIONS ─ */
  window.addEntry = function() {
    var name = document.getElementById('name-in').value.trim();
    var song = document.getElementById('song-in').value.trim();
    if (!name) { showToast('Enter a name', 'err'); document.getElementById('name-in').focus(); return; }
    if (!song) { showToast('Enter a song', 'err'); document.getElementById('song-in').focus(); return; }
    var btn = document.getElementById('add-btn');
    btn.disabled = true;
    btn.textContent = 'Adding…';
    apiCall('add', {name: name, song: song})
      .then(function() {
        document.getElementById('name-in').value = '';
        document.getElementById('song-in').value = '';
        showToast('Added to queue!', 'ok');
        loadQueue(true);
        setTab('waiting');
      })
      .catch(function(err) { showToast(err.message, 'err'); })
      .finally(function() { btn.disabled = false; btn.textContent = '+ Add to Queue'; });
  };

  window.setStatus = function(id, status) {
    apiCall('updateStatus', {id: id, status: status})
      .then(function() {
        if (status === 'done') {
          var nextWaiting = null;
          for (var i = 0; i < queue.length; i++) {
            if (queue[i].status === 'waiting' && queue[i].id !== id) { nextWaiting = queue[i]; break; }
          }
          if (nextWaiting) {
            return apiCall('updateStatus', {id: nextWaiting.id, status: 'current'})
              .then(function() { showToast('Now: ' + nextWaiting.name, 'ok'); });
          } else {
            showToast('Done - no one next', '');
          }
        }
      })
      .then(function() { loadQueue(true); })
      .catch(function() { showToast('Update failed', 'err'); });
  };

  window.promoteNext = function() {
    apiCall('promoteNext')
      .then(function(r) {
        if (r.success) { showToast('Now: ' + r.name, 'ok'); loadQueue(true); }
        else showToast('No one waiting', '');
      })
      .catch(function(err) { showToast(err.message, 'err'); });
  };

  window.moveRow = function(id, dir) {
    var wait = queue.filter(function(e) { return e.status === 'waiting'; });
    var pos  = -1;
    for (var i = 0; i < wait.length; i++) { if (wait[i].id === id) { pos = i; break; } }
    if (pos < 0) return;
    var np = pos + dir;
    if (np < 0 || np >= wait.length) return;
    var iA = -1, iB = -1;
    for (var j = 0; j < queue.length; j++) {
      if (queue[j].id === wait[pos].id) iA = j;
      if (queue[j].id === wait[np].id)  iB = j;
    }
    var tmp = queue[iA]; queue[iA] = queue[iB]; queue[iB] = tmp;
    render();
    apiCall('reorder', {ids: queue.map(function(e) { return e.id; })})
      .catch(function() { showToast('Reorder failed', 'err'); loadQueue(true); });
  };

  window.clearAll = function() {
    if (!confirm('Clear the entire queue?')) return;
    apiCall('clear')
      .then(function() { showToast('Queue cleared', 'ok'); loadQueue(true); })
      .catch(function(err) { showToast(err.message, 'err'); });
  };

  /* ─ CSV ─ */
  window.exportCSV = function() {
    if (!queue.length) { showToast('Queue is empty', 'err'); return; }
    var rows = ['id,name,song,status'];
    queue.forEach(function(e) {
      var n = '"' + String(e.name).replace(/"/g, '""') + '"';
      var s = '"' + String(e.song).replace(/"/g, '""') + '"';
      rows.push([e.id, n, s, e.status].join(','));
    });
    var blob = new Blob([rows.join('\n')], {type: 'text/csv'});
    var url  = URL.createObjectURL(blob);
    var a    = document.createElement('a');
    a.href = url;
    a.download = 'song-queue.csv';
    document.body.appendChild(a);
    a.click();
    setTimeout(function() { document.body.removeChild(a); URL.revokeObjectURL(url); }, 200);
    showToast('CSV exported', 'ok');
  };

  window.triggerImport = function() {
    var inp = document.getElementById('csv-in');
    inp.value = '';
    inp.click();
  };

  function importCSV(ev) {
    var file = ev.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(e) {
      var lines = e.target.result.trim().split('\n');
      if (lines[0].toLowerCase().indexOf('name') < 0 || lines[0].toLowerCase().indexOf('song') < 0) {
        showToast('Invalid CSV', 'err'); return;
      }
      var parsed = [];
      for (var i = 1; i < lines.length; i++) {
        var c = parseCSVLine(lines[i]);
        if (c.length >= 3 && c[1].trim()) parsed.push({name: c[1].trim(), song: c[2].trim()});
      }
      if (!parsed.length) { showToast('No valid rows', 'err'); return; }
      apiCall('clear').then(function() {
        var p = Promise.resolve();
        parsed.forEach(function(row) {
          p = p.then(function() { return apiCall('add', {name: row.name, song: row.song}); });
        });
        return p;
      })
      .then(function() { showToast('Imported ' + parsed.length, 'ok'); loadQueue(true); })
      .catch(function() { showToast('Import failed', 'err'); });
    };
    reader.readAsText(file);
  }

  function parseCSVLine(line) {
    var res = [], cur = '', inQ = false;
    for (var i = 0; i < line.length; i++) {
      var c = line[i];
      if (c === '"') {
        if (inQ && line[i+1] === '"') { cur += '"'; i++; }
        else inQ = !inQ;
      } else if (c === ',' && !inQ) { res.push(cur); cur = ''; }
      else cur += c;
    }
    res.push(cur);
    return res;
  }

  /* ─ UTILS ─ */
  function showToast(msg, type) {
    var el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'on';
    el.style.background = type === 'ok' ? 'rgba(30,100,10,0.93)' : type === 'err' ? 'rgba(180,20,10,0.93)' : 'rgba(26,8,0,0.93)';
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function() { el.classList.remove('on'); }, 2800);
  }

  window.toast = showToast; /* alias */

  function esc(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

})();
</script>
</body>
</html>
