<script>
  const _REPO = 'dallastatvamasis/dallastatvamasis.com';
  const _BRANCH = 'queue-data';
  const _JSON_FILE = 'song-queue.json';
  const _CSV_FILE = 'song-queue.csv';

  function getJsonRawUrl() {
    return `https://raw.githubusercontent.com/${_REPO}/${_BRANCH}/${_JSON_FILE}`;
  }

  function getCsvRawUrl() {
    return `https://raw.githubusercontent.com/${_REPO}/${_BRANCH}/${_CSV_FILE}`;
  }

  function queueToCsv(rows) {
    const header = ['id','name','song','status'];
    const esc = (v) => `"${String(v ?? '').replace(/"/g, '""')}"`;
    const lines = [header.join(',')];
    rows.forEach(e => {
      lines.push([
        e.id ?? '',
        esc(e.name),
        esc(e.song),
        esc(e.status || 'waiting')
      ].join(','));
    });
    return lines.join('\n');
  }

  async function getFileSha(token, path) {
    const res = await fetch(`https://api.github.com/repos/${_REPO}/contents/${path}?ref=${_BRANCH}&_t=${Date.now()}`, {
      headers: {
        'Authorization': 'Bearer ' + token,
        'Accept': 'application/vnd.github+json'
      }
    });

    if (res.status === 404) return null;

    const data = await res.json();
    if (!res.ok) throw new Error(data.message || 'SHA fetch failed');
    return data.sha || null;
  }

  async function putFile(token, path, text, message) {
    const sha = await getFileSha(token, path);

    const body = {
      message,
      content: btoa(unescape(encodeURIComponent(text))),
      branch: _BRANCH
    };
    if (sha) body.sha = sha;

    const res = await fetch(`https://api.github.com/repos/${_REPO}/contents/${path}`, {
      method: 'PUT',
      headers: {
        'Authorization': 'Bearer ' + token,
        'Accept': 'application/vnd.github+json',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(body)
    });

    const data = await res.json();
    if (!res.ok) throw new Error(data.message || `Failed to update ${path}`);
    return data;
  }

  async function syncToRepo() {
    const token = localStorage.getItem('sync_token');
    if (!token) return { ok: false, msg: 'No token configured' };

    setPillStatus('syncing');

    try {
      const jsonText = JSON.stringify(queue, null, 2);
      const csvText = queueToCsv(queue);

      await putFile(token, _JSON_FILE, jsonText, 'Update song queue JSON');
      await putFile(token, _CSV_FILE, csvText, 'Update song queue CSV');

      setPillStatus('ok');
      return { ok: true };
    } catch (e) {
      setPillStatus('error');
      return { ok: false, msg: e.message };
    }
  }

  async function loadFromGitHubJson() {
    try {
      const res = await fetch(getJsonRawUrl() + '?t=' + Date.now(), { cache: 'no-store' });
      if (!res.ok) throw new Error('JSON not found');
      const data = await res.json();
      if (Array.isArray(data)) {
        queue = data;
        localStorage.setItem('songQueue', JSON.stringify(queue));
        render();
        return true;
      }
    } catch (e) {
      console.log('GitHub JSON load skipped:', e.message);
    }
    return false;
  }

  async function initData() {
    const loaded = await loadFromGitHubJson();
    if (!loaded) {
      queue = JSON.parse(localStorage.getItem('songQueue') || '[]');
      render();
    }
  }

  function refreshSyncUrlUI() {
    const token = localStorage.getItem('sync_token');
    const sec = document.getElementById('syncUrlSection');

    if (token) {
      sec.style.display = '';
      document.getElementById('syncUrlDisplay').value = getJsonRawUrl();
    } else {
      sec.style.display = 'none';
    }

    const pill = document.getElementById('syncPill');
    if (token) {
      pill.textContent = '✓ Cloud Synced';
      pill.className = 'sync-pill synced';
    } else {
      pill.textContent = '☁️ Cloud Sync';
      pill.className = 'sync-pill';
    }
  }

  async function saveSyncSettings() {
    const token = document.getElementById('syncTokenInput').value.trim();
    if (!token) {
      document.getElementById('syncResult').textContent = '⚠️ Enter a GitHub token';
      return;
    }

    localStorage.setItem('sync_token', token);
    document.getElementById('syncResult').textContent = 'Syncing JSON + CSV...';

    const r = await syncToRepo();
    if (r.ok) {
      document.getElementById('syncResult').textContent = '✓ Synced JSON + CSV to GitHub';
      refreshSyncUrlUI();
    } else {
      document.getElementById('syncResult').textContent = '✗ Failed: ' + r.msg;
    }
  }

  refreshSyncUrlUI();
  initData();
</script>
